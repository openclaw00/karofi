<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đã nhận đơn hàng | Karofi</title>
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f7fbfd; color: #073d56; font-family: "Segoe UI", Arial, sans-serif; }
  </style>
</head>
<body>
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="index.html" aria-label="Trang chủ Karofi"><img src="assets/karofi-logo.png" alt="Karofi" class="w-40"></a>
      <nav class="flex items-center gap-5 text-sm font-black">
        <a href="index.html#products" class="hover:text-[#00adee]">Sản phẩm</a>
        <a href="cart.html" class="hover:text-[#00adee]">Giỏ hàng (<span data-cart-count>0</span>)</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto grid min-h-[calc(100vh-80px)] max-w-3xl place-items-center px-4 py-14 sm:px-6">
    <section class="w-full rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm">
      <p class="text-xs font-black uppercase tracking-[.2em] text-[#00adee]">Đặt hàng thành công</p>
      <h1 class="mt-3 text-4xl font-black">Karofi đã nhận đơn của bạn</h1>
      <p class="mt-4 text-slate-600">Nhân viên sẽ liên hệ xác nhận thông tin giao hàng và lắp đặt trong thời gian sớm nhất.</p>
      <div class="mt-6 rounded-lg bg-slate-50 p-4">
        <p class="text-sm font-bold text-slate-500">Mã đơn hàng</p>
        <p id="orderId" class="mt-1 break-all text-2xl font-black">Đang cập nhật</p>
      </div>
      <div id="emailNotice" class="mt-4 hidden rounded-lg border border-[#00adee]/25 bg-[#00adee]/10 p-4 text-sm font-bold text-[#073d56]"></div>
      <div class="mt-7 flex flex-col justify-center gap-3 sm:flex-row">
        <a href="index.html#products" class="rounded-full bg-[#073d56] px-6 py-3 text-sm font-black text-white hover:bg-[#0b597a]">Tiếp tục mua hàng</a>
        <a href="tel:19006418" class="rounded-full border border-slate-300 px-6 py-3 text-sm font-black hover:bg-slate-50">Gọi hotline 1900 6418</a>
      </div>
    </section>
  </main>

  <script src="assets/store.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order') || sessionStorage.getItem('karofi-last-order-id') || 'Đã gửi';
    const emailStatus = params.get('email');
    document.getElementById('orderId').textContent = orderId;
    if (emailStatus === 'sent') {
      const notice = document.getElementById('emailNotice');
      notice.classList.remove('hidden');
      notice.textContent = 'Tóm tắt đơn hàng đã được gửi đến email của bạn.';
    }
  </script>
</body>
</html>
