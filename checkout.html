<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán | Karofi</title>
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f7fbfd; color: #073d56; font-family: "Segoe UI", Arial, sans-serif; }
    input, textarea, select { outline-color: rgba(0, 173, 238, .45); }
    .karofi-toast {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 80;
      transform: translateY(12px);
      opacity: 0;
      border-radius: 999px;
      background: #073d56;
      color: white;
      padding: .8rem 1rem;
      font-weight: 800;
      box-shadow: 0 18px 45px rgba(7, 61, 86, .24);
      transition: opacity .2s ease, transform .2s ease;
    }
    .karofi-toast.is-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="index.html" aria-label="Trang chủ Karofi"><img src="assets/karofi-logo.png" alt="Karofi" class="w-40"></a>
      <nav class="flex items-center gap-5 text-sm font-black">
        <a href="index.html#products" class="hover:text-[#00adee]">Sản phẩm</a>
        <a href="cart.html" class="hover:text-[#00adee]">Giỏ hàng (<span data-cart-count>0</span>)</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="border-b border-slate-200 pb-6">
      <p class="text-xs font-black uppercase tracking-[.2em] text-[#00adee]">Thanh toán</p>
      <h1 class="mt-2 text-4xl font-black">Thông tin giao hàng</h1>
      <p class="mt-3 max-w-2xl text-slate-600">Khi khách gửi form này, đơn sẽ được gửi đến hệ thống xử lý đơn hàng.</p>
    </div>

    <div class="mt-8 grid gap-8 lg:grid-cols-[1fr_400px]">
      <form id="checkoutForm" class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="grid gap-5 sm:grid-cols-2">
          <label class="block text-sm font-black">Họ và tên
            <input required name="name" autocomplete="name" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="Nguyễn Văn A">
          </label>
          <label class="block text-sm font-black">Số điện thoại
            <input required name="phone" autocomplete="tel" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="0901234567">
          </label>
          <label class="block text-sm font-black sm:col-span-2">Email
            <input name="email" type="email" autocomplete="email" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="khachhang@example.com">
          </label>
          <label class="block text-sm font-black sm:col-span-2">Địa chỉ giao hàng
            <textarea required name="address" rows="3" autocomplete="street-address" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành"></textarea>
          </label>
          <label class="block text-sm font-black">Thời gian giao/lắp mong muốn
            <input name="deliveryTime" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="Cuối tuần, buổi sáng...">
          </label>
          <label class="block text-sm font-black">Thanh toán
            <select name="payment" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium">
              <option>Thanh toán khi nhận hàng</option>
              <option>Chuyển khoản ngân hàng</option>
            </select>
          </label>
          <label class="block text-sm font-black sm:col-span-2">Ghi chú
            <textarea name="note" rows="3" class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 font-medium" placeholder="Nguồn nước, vị trí lắp đặt, yêu cầu xuất hóa đơn..."></textarea>
          </label>
        </div>
        <button type="submit" class="mt-6 w-full rounded-full bg-[#ed1000] px-6 py-4 text-sm font-black text-white hover:bg-[#c90d00]">Gửi đơn hàng</button>
      </form>

      <aside class="h-max rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="text-xl font-black">Đơn của bạn</h2>
        <div id="checkoutSummary" class="mt-5 space-y-4"></div>
        <div class="mt-5 flex justify-between border-t border-slate-200 pt-4 text-lg">
          <span>Tổng cộng</span>
          <strong id="checkoutTotal">0 VNĐ</strong>
        </div>
        <a href="cart.html" class="mt-5 block rounded-full border border-slate-300 px-6 py-3 text-center text-sm font-black hover:bg-slate-50">Sửa giỏ hàng</a>
      </aside>
    </div>
  </main>

  <script src="assets/store.js"></script>
  <script>
    const form = document.getElementById('checkoutForm');
    const summary = document.getElementById('checkoutSummary');
    const total = document.getElementById('checkoutTotal');

    function renderSummary() {
      const lines = KarofiStore.getCartLines();
      total.textContent = KarofiStore.formatMoney(KarofiStore.getCartTotal());
      if (!lines.length) {
        summary.innerHTML = '<p class="rounded-lg bg-slate-50 p-4 text-sm font-bold text-slate-600">Giỏ hàng đang trống. Vui lòng chọn sản phẩm trước khi thanh toán.</p>';
        form.querySelector('button[type="submit"]').disabled = true;
        form.querySelector('button[type="submit"]').classList.add('opacity-50', 'cursor-not-allowed');
        return;
      }
      summary.innerHTML = lines.map((line) => `
        <div class="flex gap-3">
          <img src="${line.product.image}" alt="${line.product.name}" class="h-16 w-16 rounded-lg bg-slate-50 object-contain">
          <div class="min-w-0 flex-1">
            <p class="text-sm font-black">${line.product.name}</p>
            <p class="mt-1 text-xs font-bold text-slate-500">${line.quantity} x ${KarofiStore.formatMoney(line.product.price)}</p>
          </div>
        </div>
      `).join('');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const submitButton = form.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = 'Đang gửi đơn...';
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const payload = KarofiStore.buildOrderPayload(data);
        const result = await KarofiStore.submitOrderToServer(payload);
        const order = result.order;
        KarofiStore.clearCart();
        sessionStorage.setItem('karofi-last-order-id', order.id);
        const customerEmailSent = result.customerEmailSent ? '&email=sent' : '';
        window.location.href = `thank-you.html?order=${encodeURIComponent(order.id)}${customerEmailSent}`;
      } catch (error) {
        alert(`Không gửi được đơn hàng. Vui lòng thử lại hoặc gọi hotline. Chi tiết: ${error.message}`);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Gửi đơn hàng';
      }
    });

    renderSummary();
  </script>
</body>
</html>
